<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puru-Puru Mochi</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (ブラウザ上でJSXを変換するため) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>

  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #fcfbfa; font-family: sans-serif; }
  </style>
</head>
<body>
  <!-- Reactがマウントされるルート -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    // Framer Motionは window.Motion に格納されています
    const { motion } = window.Motion;

    // --- 1. SVGパスデータ ---
    const openPaths = {
      p18ed5000: "M311.895 195.51C307.277 203.51 296.894 203.839 289.396 199.51C281.897 195.18 279.315 186.345 282.396 181.01C285.476 175.674 297.397 171.68 304.896 176.01C315.396 182.072 314.976 190.174 311.895 195.51Z",
      pf0f8700: "M213.895 171.01C216.976 176.345 214.396 189.51 204.395 193.01C194.395 196.51 185.395 191.01 184.395 184.51C181.315 179.174 184.897 172.839 192.396 168.51C199.894 164.18 210.815 165.674 213.895 171.01Z",
    };

    const newPaths = {
      p1fce5880: "M241.396 194.01C241.396 196.01 239.5 196.51 238.396 196.51C238.396 196.51 235.896 196.01 235.896 194.01C235.896 192.629 237.291 191.51 238.396 191.51C239.5 191.51 241.396 192.629 241.396 194.01Z",
      p2114b300: "M220.5 181.752C220.709 182.866 208.904 185.688 198.461 186.965C188.019 188.242 184.832 187.482 187 186C186.791 184.886 190.76 183.111 199.391 181.752C208.021 180.394 220.291 180.638 220.5 181.752Z",
      p26197380: "M189.257 185.26C190.361 187.173 188.461 192.162 184.395 194.51C184.395 194.51 177.395 200.804 172.896 193.01C170.896 189.546 171.896 185.26 177.395 184.01C182.895 182.76 188.152 183.347 189.257 185.26Z",
      p317a6f00: "M310.501 193.403C310.033 195.151 301.229 193.903 292.865 191.662C284.502 189.421 278.398 186.495 278.71 185.329C279.022 184.163 287.543 184.536 295.907 186.777C307.618 189.915 310.814 192.237 310.501 193.403Z",
      p332feb80: "M256.085 123.079L259.31 126.373L259.092 128.863L270.548 129.866L270.679 128.371L270.355 126.335L271.115 123.39L272.329 120.987L275.037 118.714L278.244 116.485L279.501 113.584L279.676 111.592L279.894 109.101L280.155 106.112L278.381 103.448L275.199 99.656L276.388 103.273L276.17 105.764L274.913 108.665L272.702 110.981L270.081 112.258L268.045 112.582L265.057 112.32L262.566 112.102L260.032 112.383L257.454 113.161L255.829 114.524L254.615 116.928L254.354 119.916L256.085 123.079Z",
      p33d4cd00: "M261.896 227.51C251.806 230.521 243.396 234.01 245.896 241.01C247.396 249.01 256.024 249.521 265.396 249.01",
      p36a10d00: "M324.897 202.01C322.831 205.597 313.332 204.693 310.928 202.01C306.896 197.51 306.366 194.597 308.433 191.01C310.499 187.422 315.896 187.51 321.904 190.01C327.396 192.295 326.964 198.422 324.897 202.01Z",
      p66ba00: "M264.195 128.336C298.377 131.325 322.997 146.796 339.104 169.051C355.24 191.346 362.895 220.544 362.895 251.01C362.895 261.265 360.487 269.814 355.881 276.894C351.271 283.98 344.395 289.693 335.305 294.164C317.082 303.126 290.158 307.004 255.53 307.009C220.859 303.977 188.804 301.023 166.053 291.296C154.714 286.448 145.809 279.964 140.048 271.053C134.295 262.156 131.574 250.677 132.89 235.64C138.173 175.288 195.811 122.357 264.195 128.336Z",
      pec64a80: "M190.896 222.51C203.734 222.32 213.396 224.01 214.896 234.01C214.896 244.51 201.251 243.509 190.896 241.01",
    };

    // --- 2. キャラクター本体（SVGコンポーネント） ---
    const MochiFigma = ({ isBlinking = false, isInteracting = false, className, ...props }) => {
      return (
        <svg 
          className={`overflow-visible ${className || ''}`} 
          fill="none" 
          viewBox="0 0 522 416"
          xmlns="http://www.w3.org/2000/svg"
          {...props}
        >
          <g id="全体">
            {/* === アホ毛（頭の毛）=== */}
            <motion.path 
              d={newPaths.p332feb80} fill="#FFFBFB" stroke="#4E3A3A" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" 
              style={{ originX: 0.63, originY: 1 }}
              animate={{ rotate: isInteracting ? [-25, 30, -25] : [-4, 8, -4] }}
              transition={{
                duration: isInteracting ? 0.12 : 3,
                repeat: Infinity, ease: "easeInOut", delay: isInteracting ? 0 : 0.4 
              }}
            />
            {/* 体 */}
            <path d={newPaths.p66ba00} fill="#F3F1EC" stroke="#4E3A3A" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
            
            {/* === 左手 === */}
            <motion.path 
              d={newPaths.pec64a80} stroke="#4E3A3A" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" 
              style={{ originX: 0, originY: 0.5 }}
              animate={{ rotate: isInteracting ? [-15, 10, -15] : [-4, 6, -2] }}
              transition={{ duration: isInteracting ? 0.2 : 2.5, repeat: Infinity, ease: "easeInOut" }}
            />

            {/* === 右手 === */}
            <motion.path 
              d={newPaths.p33d4cd00} stroke="#4E3A3A" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" 
              style={{ originX: 1, originY: 0.5 }}
              animate={{ rotate: isInteracting ? [25, -30, 25] : [4, -8, 4] }}
              transition={{ duration: isInteracting ? 0.12 : 3.2, repeat: Infinity, ease: "easeInOut" }}
            />
            
            {/* 顔のパーツ（ほっぺ、口） */}
            <path d={newPaths.p26197380} fill="#FF1717" />
            <path d={newPaths.p36a10d00} fill="#FF1717" />
            <path d={newPaths.p1fce5880} fill="#4E3A3A" />

            {/* 目の切り替えロジック */}
            {isBlinking ? (
              <g id="目(閉)">
                <path d={newPaths.p2114b300} fill="#4E3A3A" />
                <path d={newPaths.p317a6f00} fill="#4E3A3A" />
              </g>
            ) : (
              <g id="目(開)">
                <path d={openPaths.pf0f8700} fill="#4E3A3A" />
                <path d={openPaths.p18ed5000} fill="#4E3A3A" />
              </g>
            )}
          </g>
        </svg>
      );
    };

    // --- 3. メインアプリケーション ---
    const App = () => {
      const [isBlinking, setIsBlinking] = useState(false);
      const [isInteracting, setIsInteracting] = useState(false);

      // ランダムに瞬きさせる副作用
      useEffect(() => {
        let timeoutId;
        const blink = () => {
          if (!isInteracting) {
            setIsBlinking(true);
            setTimeout(() => setIsBlinking(false), 150);
          }
          const nextBlinkDelay = Math.random() * 3000 + 2000;
          timeoutId = setTimeout(blink, nextBlinkDelay);
        };
        timeoutId = setTimeout(blink, 2000);
        return () => clearTimeout(timeoutId);
      }, [isInteracting]);

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden select-none">
          
          {/* 背景装飾 */}
          <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none opacity-50">
            <div className="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] rounded-full bg-gradient-to-br from-[#f5ede4] to-transparent blur-[120px]" />
            <div className="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-gradient-to-tl from-[#fae8e6] to-transparent blur-[120px]" />
          </div>

          <div className="text-center z-10 mb-8 relative pointer-events-none">
            <h1 className="text-4xl sm:text-5xl font-extrabold text-[#4E3A3A] mb-4 tracking-tight drop-shadow-sm">
              Interactive Mochi Character
            </h1>
            <p className="text-lg text-[#8c7a70] leading-relaxed">
              Drag, click, or pull to interact with it!<br/>
              It features spring physics, blinking, and sub-animations.
            </p>
          </div>

          {/* インタラクティブなキャラクターコンテナ */}
          <div className="relative z-10 w-full max-w-[450px] flex flex-col items-center justify-end h-[450px]">
            
            {/* 床の影 */}
            <motion.div 
              className="absolute bottom-16 w-[70%] h-12 bg-[#3a2a22] blur-xl rounded-[100%]"
              initial={{ opacity: 0.15, scale: 1 }}
              animate={{ opacity: [0.15, 0.08, 0.15], scale: [1, 0.85, 1] }}
              transition={{ duration: 3.5, repeat: Infinity, ease: "easeInOut" }}
            />

            {/* もちもち・プルプルの物理演算ラッパー (Framer MotionのDrag機能) */}
            <motion.div
              className="w-full relative cursor-grab active:cursor-grabbing origin-bottom"
              drag
              dragConstraints={{ left: 0, right: 0, top: 0, bottom: 0 }} 
              dragElastic={0.8}
              
              onPointerDown={() => {
                setIsInteracting(true);
                setIsBlinking(true); // 触った瞬間に目をぎゅっとつむる
              }}
              onPointerUp={() => {
                setIsInteracting(false);
                setIsBlinking(false); // 離すと目を開ける
              }}
              onPointerCancel={() => {
                setIsInteracting(false);
                setIsBlinking(false);
              }}
              
              whileHover={{ scale: 1.05 }}
              whileTap={{ scaleX: 1.25, scaleY: 0.75 }}
              whileDrag={{ scaleX: 0.85, scaleY: 1.2 }}
              
              transition={{
                type: "spring",
                stiffness: 350,
                damping: 8,
                mass: 1.5
              }}
            >
              {/* ふんわり呼吸するアニメーション */}
              <motion.div
                className="w-full origin-bottom"
                animate={{ scaleY: [1, 1.03, 1], scaleX: [1, 0.98, 1], y: [0, -8, 0] }}
                transition={{ duration: 3.5, repeat: Infinity, ease: "easeInOut" }}
              >
                <MochiFigma 
                  isBlinking={isBlinking} 
                  isInteracting={isInteracting}
                  className="w-full h-auto drop-shadow-md pointer-events-none" 
                />
              </motion.div>
            </motion.div>
          </div>
        </div>
      );
    }

    // --- 4. レンダリング ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
